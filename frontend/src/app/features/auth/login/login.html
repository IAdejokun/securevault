<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1>SecureVault</h1>
      <p>Zero Trust API Key Manager</p>
    </div>

    <form (ngSubmit)="submit()">
      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      @if (error) {
        <div class="error">{{ error }}</div>
      }

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="switch">
      No account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
